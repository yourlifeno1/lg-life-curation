name: Daily Naver Trend Update

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      # v3 대신 최신 v4 사용
      uses: actions/checkout@v4 

    - name: Set up Python
      # v4 대신 최신 v5 사용
      uses: actions/setup-python@v5 
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas

    - name: Run Trend Crawler
      run: python trend_crawler.py
