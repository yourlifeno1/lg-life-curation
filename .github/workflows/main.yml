name: Daily LG Sales Intelligence

on:
  # 1. 수동 실행 버튼 활성화
  workflow_dispatch:
  # 2. 매일 새벽 3시에 자동으로 실행 (UTC 기준 18:00이 한국 시간 03:00)
  schedule:
    - cron: '0 18 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 소스코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. 파이썬 환경 설정
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # 3. 필요한 도구 설치 (requirements.txt 기준)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. 크롤러 실행
      - name: Run crawler
        run: python crawler.py
