name: Daily LG Sales Intelligence Crawler

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 소스코드 가져오기
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. 파이썬 환경 설정
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # 3. 필수 패키지 설치
      - name: Install 필수 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      # 4. [수정됨] 파일이 어디 있든 'crawler.py'라는 이름을 가진 파일을 찾아 실행합니다.
      - name: Run Crawler
        run: |
          PYTHON_FILE=$(find . -name "crawler.py" | head -n 1)
          if [ -z "$PYTHON_FILE" ]; then
            echo "❌ crawler.py 파일을 찾을 수 없습니다. 파일명을 확인해주세요."
            exit 1
          else
            echo "🚀 실행 파일 발견: $PYTHON_FILE"
            python "$PYTHON_FILE"
          fi
