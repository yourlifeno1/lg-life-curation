name: Daily LG Sales Intelligence Crawler

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install 필수 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml 

      # 폴더 안으로 직접 들어가서 파일을 찾는 방식으로 변경했습니다.
      - name: Run Crawler
        run: |
          find . -name "crawler.py" -exec python {} \;
