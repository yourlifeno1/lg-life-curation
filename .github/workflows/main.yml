name: Daily LG Sales Intelligence Crawler

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 저장소의 코드를 그대로 가져옵니다
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. 파이썬 환경 설정
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # 3. 필수 패키지 설치
      - name: Install 필수 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      # 4. 크롤러 실행 (현재 위치에 있는 crawler.py를 바로 실행합니다)
      - name: Run Crawler
        run: python crawler.py
