name: Daily LG Sales Intelligence Crawler

on:
  # 1. 수동 실행 버튼 활성화
  workflow_dispatch:
  # 2. 매일 한국 시간 기준 오전 3시 실행 (UTC 18:00)
  schedule:
    - cron: '0 18 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 소스코드 가져오기
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. 파이썬 환경 설정
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # 3. 필수 패키지 강제 설치 (초보자분들을 위해 파일 유무 상관없이 직접 설치합니다)
      - name: Install 필수 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      # 4. 크롤러 실행 (매니저님의 naver_voc 폴더 경로를 정확히 지정했습니다)
      - name: Run Crawler
        run: python ./naver_voc/crawler.py
