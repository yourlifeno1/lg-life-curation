name: Daily LG Sales Intelligence Crawler

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 소스코드 가져오기
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. 파이썬 환경 설정
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # 3. 필수 패키지 설치
      - name: Install 필수 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      # 4. [가장 중요] 어떤 경로에 있든 파일을 찾아내서 실행
      - name: Run Crawler
        run: |
          CRAWLER_PATH=$(find . -name "crawler.py" | head -n 1)
          if [ -z "$CRAWLER_PATH" ]; then
            echo "❌ crawler.py 파일을 저장소 어디에서도 찾을 수 없습니다."
            exit 1
          else
            echo "🚀 실행 파일 위치 확인: $CRAWLER_PATH"
            python "$CRAWLER_PATH"
          fi
