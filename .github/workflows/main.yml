name: Daily LG Sales Intelligence Crawler

on:
  # 1. 수동 실행 버튼 활성화 (GitHub Actions 탭에서 직접 실행 가능)
  workflow_dispatch:
  # 2. 매일 한국 시간 기준 오전 3시 실행 (UTC 18:00)
  schedule:
    - cron: '0 18 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 저장소의 코드를 가상 컴퓨터로 가져옴
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. 파이썬 3.9 환경 설치
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # 3. 크롤링 및 전송에 필요한 필수 도구 강제 설치
      - name: Install 필수 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      # 4. 크롤러 실행
      - name: Run Crawler
        run: python crawler.py
